<!DOCTYPE html>

    <meta name="keywords" content="Dušan Pudar, web developer, portfolio" />

    <meta name="robots" content="index, follow" />

    <meta property="og:title" content="Dušan Pudar" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      rel="stylesheet"
    />

    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.png" />

  <body>

        <div class="divider"></div>

        <nav class="socials" aria-label="Društvene mreže">
          <a
            href="https://linkedin.com/in/dusanpudar"
            target="_blank"
            rel="noopener"
            aria-label="LinkedIn profil"
            class="social-link"
          ><i class="fab fa-linkedin-in"></i></a>
          <a
            href="https://github.com/dusanpudar"
            target="_blank"
            rel="noopener"
            aria-label="GitHub profil"
            class="social-link"
          ><i class="fab fa-github"></i></a>
          <a
            href="https://twitter.com/dusanpudar"
            target="_blank"
            rel="noopener"
            aria-label="Twitter profil"
            class="social-link"
          ><i class="fab fa-twitter"></i></a>
          <a
            href="https://instagram.com/dusanpudar"
            target="_blank"
            rel="noopener"
            aria-label="Instagram profil"
            class="social-link"
          ><i class="fab fa-instagram"></i></a>
